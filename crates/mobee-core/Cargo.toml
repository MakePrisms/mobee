[package]
name = "mobee-core"
version.workspace = true
edition.workspace = true
description.workspace = true
repository.workspace = true
publish.workspace = true

[features]
default = []
acp = []
gateway = ["dep:nostr-sdk"]
wallet = ["dep:cashu", "dep:cdk"]
test-support = []

[dependencies]
cashu = { version = "=0.17.2", optional = true }
cdk = { version = "=0.17.2", default-features = false, features = ["wallet"], optional = true }
hex = "0.4.3"
nostr-sdk = { version = "0.44.1", features = ["nip59"], optional = true }
serde.workspace = true
serde_json.workspace = true
sha2 = "0.11.0"

[dev-dependencies]
async-trait = "0.1.89"
url = "2.5.8"
